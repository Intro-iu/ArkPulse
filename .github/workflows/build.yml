name: Build & Release

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]

permissions:
  contents: write

env:
  FLUTTER_VERSION: '3.41.5'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: windows
            artifact: arkpulse-windows
            build-cmd: flutter build windows --release
            output-path: build/windows/x64/runner/Release
          - os: ubuntu-latest
            target: linux
            artifact: arkpulse-linux
            build-cmd: flutter build linux --release
            output-path: build/linux/x64/release/bundle
          # - os: macos-latest
          #   target: macos
          #   artifact: arkpulse-macos
          #   build-cmd: flutter build macos --release
          #   output-path: build/macos/Build/Products/Release

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Determine version string ──────────────────────────────
      - name: Set version from tag or commit
        shell: bash
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "APP_VERSION=${{ github.ref_name }}" >> $GITHUB_ENV
          else
            SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
            echo "APP_VERSION=dev-${SHORT_SHA}" >> $GITHUB_ENV
          fi

      # ── Install system dependencies ───────────────────────────
      - name: Install Linux dependencies
        if: matrix.target == 'linux'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            clang cmake git ninja-build pkg-config \
            libgtk-3-dev liblzma-dev libstdc++-12-dev \
            libmpv-dev mpv \
            libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev

      # - name: Install macOS dependencies
      #   if: matrix.target == 'macos'
      #   run: brew install mpv

      # ── Toolchains ────────────────────────────────────────────
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('rust/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      # ── Build ─────────────────────────────────────────────────
      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Build application
        run: ${{ matrix.build-cmd }}

      # ── Package ───────────────────────────────────────────────
      - name: Compile Windows Installer
        if: matrix.target == 'windows'
        shell: pwsh
        run: |
          iscc /dAppVersion=${{ env.APP_VERSION }} windows/installer.iss
          Move-Item "windows/Output/arkpulse-windows-setup.exe" "ArkPulse_${{ env.APP_VERSION }}_windows_x64_setup.exe"

      - name: Compile Linux Packages
        if: matrix.target == 'linux'
        run: |
          # Install fpm for native package building
          sudo apt-get install -y ruby ruby-dev rubygems zstd libarchive-tools
          sudo gem install fpm
          
          # Setup filesystem structure
          PKG_ROOT="linux_packaging"
          mkdir -p $PKG_ROOT/opt/arkpulse \
                   $PKG_ROOT/usr/share/applications \
                   $PKG_ROOT/usr/share/pixmaps \
                   $PKG_ROOT/usr/bin
          
          # Copy binary and resources
          cp -r "${{ matrix.output-path }}"/* $PKG_ROOT/opt/arkpulse/
          cp "macos/Runner/Assets.xcassets/AppIcon.appiconset/app_icon_256.png" $PKG_ROOT/usr/share/pixmaps/arkpulse.png
          
          # Create .desktop file
          cat <<EOF > $PKG_ROOT/usr/share/applications/arkpulse.desktop
          [Desktop Entry]
          Name=ArkPulse
          Exec=/opt/arkpulse/arkpulse
          Icon=arkpulse
          Type=Application
          Terminal=false
          Categories=AudioVideo;Audio;Player;
          EOF
          
          # Create bin symlink
          ln -s /opt/arkpulse/arkpulse $PKG_ROOT/usr/bin/arkpulse
          
          # Build .deb
          fpm -s dir -t deb -n arkpulse -v ${{ env.APP_VERSION }} --architecture amd64 -d "mpv" -C $PKG_ROOT .
          
          # Build pacman
          PACMAN_VER=$(echo ${{ env.APP_VERSION }} | tr '-' '.')
          fpm -s dir -t pacman -n arkpulse -v $PACMAN_VER --architecture x86_64 -d "mpv" -C $PKG_ROOT .
          mv arkpulse-${PACMAN_VER}-1-x86_64.pkg.tar.zst arkpulse_${{ env.APP_VERSION }}_x86_64.pkg.tar.zst

      # ── Upload build artifact ─────────────────────────────────
      - name: Upload Windows Setup
        if: matrix.target == 'windows'
        uses: actions/upload-artifact@v4
        with:
          name: ArkPulse_${{ env.APP_VERSION }}_windows_x64_setup
          path: ArkPulse_${{ env.APP_VERSION }}_windows_x64_setup.exe

      - name: Upload Linux DEB
        if: matrix.target == 'linux'
        uses: actions/upload-artifact@v4
        with:
          name: arkpulse_${{ env.APP_VERSION }}_amd64_deb
          path: arkpulse_${{ env.APP_VERSION }}_amd64.deb

      - name: Upload Linux Pacman
        if: matrix.target == 'linux'
        uses: actions/upload-artifact@v4
        with:
          name: arkpulse_${{ env.APP_VERSION }}_x86_64_pacman
          path: arkpulse_${{ env.APP_VERSION }}_x86_64.pkg.tar.zst


  # ── Release (tag-triggered only) ────────────────────────────────
  release:
    needs: build
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ArkPulse ${{ github.ref_name }}
          draft: false
          prerelease: false
          files: artifacts/*
          generate_release_notes: true
